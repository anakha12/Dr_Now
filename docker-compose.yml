version: '3.8'

services:
  # 1. The automated NGINX proxy that routes traffic based on VIRTUAL_HOST
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: drnow-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - dhparam:/etc/nginx/dhparam
    networks:
      - webnet

  # 2. The automated Let's Encrypt companion that grabs SSL certificates
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: drnow-acme-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh
    environment:
      # !! URGENT: CHANGE THIS !! Set to your real email to get expiration warnings
      - DEFAULT_EMAIL=your@email.com
    depends_on:
      - nginx-proxy
    networks:
      - webnet

  # 3. Your Node.js Server
  server:
    image: anakha07/drnow-server:latest # !! CHANGE THIS !! Replace with your Docker Hub username
    container_name: drnow-server
    expose:
      - "5000" # Exposes internally to nginx-proxy (Do not use 'ports' to keep it secure)
    environment:
      - REDIS_URL=redis://redis:6379 
      # Set to your purchased domain name
      - VIRTUAL_HOST=api.drnow.site
      - VIRTUAL_PORT=5000
      - LETSENCRYPT_HOST=api.drnow.site
    env_file:
      - ./server/.env
    depends_on:
      - redis
    networks:
      - webnet

  # 4. Your Database
  redis:
    image: redis:7-alpine
    container_name: drnow-redis
    volumes:
      - redis_data:/data
    networks:
      - webnet

volumes:
  redis_data:
  certs:
  vhost:
  html:
  dhparam:
  acme:

networks:
  webnet:
